server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: waterwheel-chain-transmission

  datasource:
    url: jdbc:postgresql://localhost:5432/waterwheel_simulation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mqtt:
  broker: tcp://localhost:1883
  client-id: waterwheel-backend
  username: admin
  password: admin
  topic:
    alert: waterwheel/alert
    sensor: waterwheel/sensor
  qos: 1

simulation:
  chain:
    default-link-mass: 0.25
    default-link-length: 0.125
    default-stiffness: 500000.0
    default-damping: 150.0
    default-friction: 0.15
  dynamics:
    time-step: 0.001
    simulation-duration: 2.0
    max-iterations: 2000

optimization:
  response-surface:
    design-points: 15
    max-iterations: 50
    convergence-tolerance: 1.0e-6
  scraper:
    min-depth: 0.05
    max-depth: 0.20
    min-width: 0.10
    max-width: 0.40
    min-angle: 15.0
    max-angle: 60.0
  chain-speed:
    min: 0.5
    max: 3.0

alert:
  check-interval-ms: 30000
  chain-tension-warning-ratio: 0.75
  chain-tension-critical-ratio: 0.90
  water-flow-min-ratio: 0.6

logging:
  level:
    com.waterwheel.chaintransmission: DEBUG
    org.hibernate.SQL: WARN
