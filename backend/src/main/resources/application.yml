server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: waterwheel-chain-transmission

  config:
    import:
      - config/dtu-receiver.yml
      - config/chain-dynamics.yml
      - config/efficiency-optimization.yml
      - config/alert-thresholds.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/waterwheel_simulation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mqtt:
  broker: tcp://localhost:1883
  client-id: waterwheel-backend
  username: admin
  password: admin
  topic:
    alert: waterwheel/alert
    sensor: waterwheel/sensor
  qos: 1

logging:
  level:
    com.waterwheel.chaintransmission: DEBUG
    org.hibernate.SQL: WARN
